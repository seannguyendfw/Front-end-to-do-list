<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="TaskFlow Dashboard - Quản lý công việc của bạn"/>
  <title>TaskFlow — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/dashboard.css"/>
</head>
<body>

<div class="dashboard-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="10" fill="url(#lg2)"/>
          <path d="M9 16.5L13.5 21L23 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="lg2" x1="0" y1="0" x2="32" y2="32">
              <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-name">TaskFlow</span>
    </div>

    <!-- Navigation -->
    <span class="nav-section-title">Điều hướng</span>

    <button class="nav-item active" id="navTasks" onclick="showView('tasks')">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Công việc
      <span class="nav-badge" id="tasksBadge">0</span>
    </button>

    <button class="nav-item" id="navUsers" onclick="showView('users')" style="display:none" id="navUsersBtn">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zm9 4v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Người dùng
      <span class="nav-badge" id="usersBadge">0</span>
    </button>

    <!-- Category filter -->
    <span class="nav-section-title" style="margin-top:12px">Danh mục</span>

    <div class="category-filters" id="categoryFilters">
      <button class="category-btn active" onclick="filterCategory('all')">
        <div class="category-dot" style="background: #6366f1"></div>
        Tất cả
      </button>
    </div>

    <!-- Sidebar footer (user) -->
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div>
          <div class="user-name" id="sidebarName">Loading...</div>
          <div class="user-role" id="sidebarRole">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Đăng xuất
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-greeting">
        <h2 id="headerGreeting">Xin chào!</h2>
        <p id="headerDate"></p>
      </div>
      <div class="header-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Tìm kiếm công việc..." oninput="handleSearch(this.value)"/>
        </div>
        <button class="add-task-btn" id="addTaskBtn" onclick="openTaskModal()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Thêm công việc
        </button>
      </div>
    </header>

    <!-- ===== TASKS VIEW ===== -->
    <div id="tasksView">

      <!-- Stats -->
      <section class="stats-section">
        <div class="stat-card total">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Tổng công việc</div>
          </div>
        </div>

        <div class="stat-card pending">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="statPending">0</div>
            <div class="stat-label">Chờ thực hiện</div>
          </div>
        </div>

        <div class="stat-card progress">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="statProgress">0</div>
            <div class="stat-label">Đang thực hiện</div>
          </div>
        </div>

        <div class="stat-card done">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="statDone">0</div>
            <div class="stat-label">Hoàn thành</div>
          </div>
        </div>
      </section>

      <!-- Task list -->
      <section class="tasks-section">
        <div class="tasks-header">
          <h3 class="tasks-title" id="tasksListTitle">Danh sách công việc</h3>
          <div style="display:flex;gap:10px;align-items:center">
            <!-- Filter tabs -->
            <div class="filter-tabs">
              <button class="filter-tab active" onclick="setFilter('all', this)">Tất cả</button>
              <button class="filter-tab" onclick="setFilter('todo', this)">Chờ</button>
              <button class="filter-tab" onclick="setFilter('inprogress', this)">Đang làm</button>
              <button class="filter-tab" onclick="setFilter('done', this)">Xong</button>
            </div>
            <!-- Sort -->
            <select class="sort-select" onchange="setSortBy(this.value)">
              <option value="newest">Mới nhất</option>
              <option value="oldest">Cũ nhất</option>
              <option value="priority">Ưu tiên</option>
              <option value="duedate">Hạn chót</option>
            </select>
          </div>
        </div>

        <!-- Progress overview -->
        <div class="progress-bar-container" id="progressContainer" style="margin-bottom:16px">
          <div class="progress-label">
            <span>Tiến độ hoàn thành</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>

        <!-- Task list -->
        <div class="task-list" id="taskList">
          <!-- Tasks rendered here -->
        </div>
      </section>

    </div>

    <!-- ===== USERS VIEW (Admin only) ===== -->
    <div id="usersView" class="hidden">
      <div class="users-panel">
        <div class="panel-header">
          <h2 class="panel-title">👥 Quản lý người dùng</h2>
          <button class="btn-secondary" onclick="openAddUserModal()">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>
            </svg>
            Thêm người dùng
          </button>
        </div>
        <div class="users-grid" id="usersGrid">
          <!-- Users rendered here -->
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ===== TASK MODAL ===== -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Thêm công việc mới</h3>
      <button class="modal-close" onclick="closeTaskModal()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <form class="modal-form" id="taskForm" onsubmit="handleSaveTask(event)">
      <input type="hidden" id="editTaskId"/>

      <div class="form-group">
        <label for="taskTitle">Tiêu đề công việc *</label>
        <div class="input-wrapper">
          <input type="text" id="taskTitle" placeholder="Nhập tiêu đề..." required/>
        </div>
      </div>

      <div class="form-group">
        <label for="taskDesc">Mô tả</label>
        <textarea id="taskDesc" placeholder="Mô tả chi tiết công việc..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="taskPriority">Mức độ ưu tiên</label>
          <select id="taskPriority">
            <option value="low">🟢 Thấp</option>
            <option value="medium" selected>🟡 Trung bình</option>
            <option value="high">🔴 Cao</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taskStatus">Trạng thái</label>
          <select id="taskStatus">
            <option value="todo">⏳ Chờ thực hiện</option>
            <option value="inprogress">⚡ Đang làm</option>
            <option value="done">✅ Hoàn thành</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="taskCategory">Danh mục</label>
          <input type="text" id="taskCategory" placeholder="VD: Công việc, Học tập..."/>
        </div>
        <div class="form-group">
          <label for="taskDueDate">Hạn chót</label>
          <input type="date" id="taskDueDate"/>
        </div>
      </div>

      <!-- Assign to (admin only) -->
      <div class="form-group hidden" id="assignToGroup">
        <label for="taskAssignTo">Giao cho</label>
        <select id="taskAssignTo"></select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeTaskModal()">Hủy</button>
        <button type="submit" class="btn-primary" id="saveTaskBtn">
          <span>Lưu công việc</span>
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ===== ADD USER MODAL ===== -->
<div class="modal-overlay hidden" id="addUserModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Thêm người dùng mới</h3>
      <button class="modal-close" onclick="closeAddUserModal()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <form class="modal-form" onsubmit="handleAddUser(event)">
      <div class="form-group">
        <label>Họ và tên</label>
        <div class="input-wrapper"><input type="text" id="newUserFullname" placeholder="Nguyễn Văn A" required/></div>
      </div>
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <div class="input-wrapper"><input type="text" id="newUserUsername" placeholder="ten_dang_nhap" required/></div>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-wrapper"><input type="password" id="newUserPassword" placeholder="Ít nhất 6 ký tự" required/></div>
      </div>
      <div class="form-group">
        <label>Vai trò</label>
        <select id="newUserRole">
          <option value="user">Người dùng</option>
          <option value="admin">Quản trị viên</option>
        </select>
      </div>
      <div id="addUserError" class="error-msg hidden"></div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeAddUserModal()">Hủy</button>
        <button type="submit" class="btn-primary">
          <span>Tạo tài khoản</span>
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal" style="max-width:380px; text-align:center;">
    <div style="font-size:48px; margin-bottom:16px;">🗑️</div>
    <h3 class="modal-title" style="font-size:18px; margin-bottom:8px;" id="confirmTitle">Xác nhận xoá</h3>
    <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;" id="confirmMsg">Bạn có chắc muốn xoá?</p>
    <div style="display:flex; gap:10px;">
      <button class="btn-cancel" style="flex:1" onclick="closeConfirm()">Hủy</button>
      <button class="btn-primary" style="flex:1; background:linear-gradient(135deg,#dc2626,#ef4444)" id="confirmOkBtn">
        <span>Xoá</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
